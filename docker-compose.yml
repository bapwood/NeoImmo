services:
  database:
    container_name: postgres
    image: postgres:alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - NeoImmo-docker

  chain:
    container_name: chain
    image: ghcr.io/foundry-rs/foundry:latest
    restart: always
    entrypoint: ["anvil"]
    command:
      - --host
      - "0.0.0.0"
      - --port
      - "8545"
      - --chain-id
      - "31337"
      - --accounts
      - "10"
      - --mnemonic
      - ${BLOCKCHAIN_MNEMONIC:-test test test test test test test test test test test junk}
    ports:
      - "${HARDHAT_PORT:-8545}:8545"
    healthcheck:
      test: ["CMD-SHELL", "cast rpc ots_getApiLevel --rpc-url http://127.0.0.1:8545 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - NeoImmo-docker

  chain-deployer:
    container_name: chain-deployer
    build:
      context: ./crypto
      dockerfile: Dockerfile
    command: npm run deploy:local
    environment:
      DEPLOYMENTS_FILE: /usr/src/app/deployments/local.json
      RPC_LOCALHOST: http://chain:8545
      BLOCKCHAIN_MNEMONIC: ${BLOCKCHAIN_MNEMONIC:-test test test test test test test test test test test junk}
    depends_on:
      chain:
        condition: service_healthy
    volumes:
      - ./crypto:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - NeoImmo-docker

  server:
    container_name: backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${SERVER_PORT}
      JWT_SECRET: ${JWT_SECRET}
      UPLOAD_DIR: /usr/src/app/uploads
      BLOCKCHAIN_ENABLED: "true"
      BLOCKCHAIN_RPC_URL: http://chain:8545
      BLOCKCHAIN_CHAIN_ID: 31337
      BLOCKCHAIN_MNEMONIC: ${BLOCKCHAIN_MNEMONIC:-test test test test test test test test test test test junk}
      BLOCKCHAIN_BACKEND_ACCOUNT_INDEX: ${BLOCKCHAIN_BACKEND_ACCOUNT_INDEX:-0}
      BLOCKCHAIN_TREASURY_ACCOUNT_INDEX: ${BLOCKCHAIN_TREASURY_ACCOUNT_INDEX:-1}
      BLOCKCHAIN_DEFAULT_COUNTRY_CODE: ${BLOCKCHAIN_DEFAULT_COUNTRY_CODE:-FR}
      BLOCKCHAIN_DEPLOYMENTS_FILE: /usr/src/crypto/deployments/local.json
      BLOCKCHAIN_METADATA_BASE_URL: http://localhost:${SERVER_PORT:-3001}
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    depends_on:
      database:
        condition: service_healthy
      chain-deployer:
        condition: service_completed_successfully
    volumes:
      - ./backend:/usr/src/app
      - ./crypto:/usr/src/crypto:ro
      - /usr/src/app/node_modules
    networks:
      - NeoImmo-docker
    command: npm run start:migrated

  prisma-studio:
    container_name: prisma-studio
    image: node:20-alpine
    working_dir: /usr/src/app
    volumes:
      - .:/usr/src/app
    command: npx prisma studio --port 5555 --browser none --url "${DATABASE_URL}"
    ports:
      - "5555:5555"
    environment:
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - NeoImmo-docker
    depends_on:
      database:
        condition: service_healthy

  otterscan:
    container_name: otterscan
    image: otterscan/otterscan:latest
    restart: always
    depends_on:
      chain:
        condition: service_healthy
    environment:
      OTS2: "false"
      OTTERSCAN_CONFIG: >-
        {
          "erigonURL": "http://localhost:${HARDHAT_PORT:-8545}",
          "experimentalFixedChainId": 31337,
          "branding": {
            "siteName": "NeoImmo Explorer",
            "networkTitle": "Local Devnet",
            "hideAnnouncements": true
          },
          "chainInfo": {
            "name": "NeoImmo Local Devnet",
            "faucets": [],
            "nativeCurrency": {
              "name": "Ether",
              "symbol": "ETH",
              "decimals": 18
            }
          },
          "externalDataSources": {
            "ccip": {
              "ensLookups": false
            }
          }
        }
    ports:
      - "${OTTERSCAN_PORT:-5100}:80"
    networks:
      - NeoImmo-docker

  # redis:
  #   container_name: redis
  #   image: redis:alpine
  #   ports:
  #     - "6379:6379"
  #   restart: always
  #   networks:
  #     - NeoImmo-docker

volumes:
  pgdata:

networks:
  NeoImmo-docker:
    driver: bridge
